<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 主渐变：科技蓝到健康绿 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#50C878"/>
    </linearGradient>
    
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    
    <!-- 时钟渐变 -->
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 内圈装饰 -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="#fff" stroke-width="3" opacity="0.2"/>
  
  <!-- 时钟背景圆 -->
  <circle cx="512" cy="420" r="200" fill="#fff" opacity="0.95" filter="url(#innerShadow)"/>
  
  <!-- 时钟刻度 -->
  <g stroke="#64748B" stroke-width="4" stroke-linecap="round">
    <!-- 12点 -->
    <line x1="512" y1="250" x2="512" y2="280"/>
    <!-- 3点 -->
    <line x1="642" y1="420" x2="612" y2="420"/>
    <!-- 6点 -->
    <line x1="512" y1="560" x2="512" y2="590"/>
    <!-- 9点 -->
    <line x1="382" y1="420" x2="412" y2="420"/>
  </g>
  
  <!-- 时钟指针 -->
  <g stroke="url(#clockGrad)" stroke-width="12" stroke-linecap="round">
    <!-- 分针 -->
    <line x1="512" y1="420" x2="512" y2="290">
      <animateTransform attributeName="transform" type="rotate" from="0 512 420" to="360 512 420" dur="60s" repeatCount="indefinite"/>
    </line>
    <!-- 时针 -->
    <line x1="512" y1="420" x2="512" y2="330">
      <animateTransform attributeName="transform" type="rotate" from="0 512 420" to="360 512 420" dur="720s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- 中心圆点 -->
  <circle cx="512" cy="420" r="15" fill="url(#clockGrad)"/>
  
  <!-- 起立伸展的人物剪影 -->
  <g fill="#fff" opacity="0.95">
    <!-- 头部 -->
    <circle cx="512" cy="680" r="30"/>
    <!-- 身体 -->
    <path d="M512 720 L512 820 L472 900 L482 900 L512 840 L542 900 L552 900 L512 820 Z" fill="#fff"/>
    <!-- 手臂（伸展向上） -->
    <path d="M472 750 L400 680 L410 670 L478 738 Z" fill="#fff"/>
    <path d="M552 750 L624 680 L614 670 L546 738 Z" fill="#fff"/>
  </g>
  
  <!-- 强调弧线（动态感） -->
  <path d="M312 280 Q 250 420 312 560" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <path d="M712 280 Q 774 420 712 560" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  
  <!-- 小装饰点 -->
  <circle cx="280" cy="420" r="8" fill="#fff" opacity="0.4"/>
  <circle cx="744" cy="420" r="8" fill="#fff" opacity="0.4"/>
</svg>