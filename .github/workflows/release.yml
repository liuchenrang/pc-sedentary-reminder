name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: false
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: darwin
            ext: ''
          - os: ubuntu-22.04
            platform: linux
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        shell: bash
        run: |
          TAG_NAME=${{ github.event.inputs.tag || github.ref_name }}
          wails build -ldflags "-X main.AppVersion=$TAG_NAME"
        env:
          CGO_ENABLED: 1

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/bin
          Compress-Archive -Path sitlong.exe -DestinationPath sitlong-${{ github.ref_name }}-windows-amd64.zip

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: |
          cd build/bin
          zip -r sitlong-${{ github.ref_name }}-darwin-amd64.zip sitlong.app

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build/bin
          zip sitlong-${{ github.ref_name }}-linux-amd64.zip sitlong

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitlong-${{ matrix.platform }}
          path: build/bin/sitlong-${{ github.ref_name }}-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
